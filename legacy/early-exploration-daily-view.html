<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Toggl Focus — Daily View</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; background: #F7F5F2; }
  @keyframes pulseFill { 0% { box-shadow: 0 0 0 0 rgba(58,107,95,0.35); } 100% { box-shadow: 0 0 0 10px rgba(58,107,95,0); } }
  .gap-filled-highlight { animation: pulseFill 900ms ease-out; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useRef, useEffect } = React;

/* ---------- Constants ---------- */
const DAY_START = 7;   // 7am
const DAY_END = 20;    // 8pm
const PX_PER_HOUR = 64;

const PROJECTS = [
  { id: "acme",    name: "Acme Corp",     color: "#3A6B5F" }, // deep teal-green
  { id: "personal",name: "Personal",      color: "#C8763E" }, // warm clay
  { id: "side",    name: "Side Project",  color: "#7A6FB0" }, // muted violet
];

const projectById = (id) => PROJECTS.find(p => p.id === id);

const toMinutes = (h, m = 0) => h * 60 + m;
const fmtTime = (mins) => {
  const h24 = Math.floor(mins / 60);
  const m = mins % 60;
  const ampm = h24 >= 12 ? "PM" : "AM";
  let h12 = h24 % 12; if (h12 === 0) h12 = 12;
  return `${h12}:${String(m).padStart(2, "0")} ${ampm}`;
};
const fmtDuration = (mins) => {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
};

/* ---------- Seed data ---------- */
const seedEntries = () => [
  {
    id: "e1", projectId: "acme",
    start: toMinutes(7, 30), end: toMinutes(8, 45),
    title: "Inbox triage + standup prep",
    type: "live", loggedAt: null,
  },
  {
    id: "e2", projectId: "acme",
    start: toMinutes(9, 0), end: toMinutes(10, 30),
    title: "Sprint planning",
    type: "manual", loggedAt: "Logged at 1:40 PM",
  },
  {
    id: "e3", projectId: "side",
    start: toMinutes(11, 0), end: toMinutes(12, 0),
    title: "Landing page redesign",
    type: "live", loggedAt: null,
  },
  // gap 12:00 - 13:15 untracked
  {
    id: "e4", projectId: "personal",
    start: toMinutes(13, 15), end: toMinutes(13, 45),
    title: "Lunch errands logged",
    type: "manual", loggedAt: "Logged at 6:05 PM",
  },
  {
    id: "e5", projectId: "acme",
    start: toMinutes(14, 0), end: toMinutes(16, 0),
    title: "Client deck review",
    type: "live", loggedAt: null,
  },
  // gap 16:00 - 17:00 untracked
  {
    id: "e6", projectId: "side",
    start: toMinutes(17, 0), end: toMinutes(18, 0),
    title: "Side project bug fixes",
    type: "manual", loggedAt: "Logged at 6:10 PM",
  },
  // gap 18:00 - 20:00 untracked
];

/* ---------- Gap computation ---------- */
function computeGaps(entries) {
  const dayStart = toMinutes(DAY_START);
  const dayEnd = toMinutes(DAY_END);
  const sorted = [...entries].sort((a, b) => a.start - b.start);
  const gaps = [];
  let cursor = dayStart;
  for (const e of sorted) {
    if (e.start > cursor) {
      gaps.push({ start: cursor, end: e.start });
    }
    cursor = Math.max(cursor, e.end);
  }
  if (cursor < dayEnd) gaps.push({ start: cursor, end: dayEnd });
  return gaps.filter(g => g.end - g.start >= 5); // ignore tiny slivers
}

/* ---------- Positioning helper ---------- */
const topFor = (mins) => (mins - toMinutes(DAY_START)) / 60 * PX_PER_HOUR;
const heightFor = (startMin, endMin) => Math.max((endMin - startMin) / 60 * PX_PER_HOUR, 28);

/* ---------- Tooltip ---------- */
function Tooltip({ children, content }) {
  const [show, setShow] = useState(false);
  return (
    <div
      className="relative h-full"
      onMouseEnter={() => setShow(true)}
      onMouseLeave={() => setShow(false)}
    >
      {children}
      {show && (
        <div className="absolute left-full top-0 ml-2 z-30 w-60 rounded-lg bg-stone-900 text-stone-50 text-xs px-3 py-2 shadow-lg leading-snug pointer-events-none">
          {content}
        </div>
      )}
    </div>
  );
}

/* ---------- Entry block ---------- */
function EntryBlock({ entry, fading }) {
  const project = projectById(entry.projectId);
  const isLive = entry.type === "live";
  const duration = entry.end - entry.start;

  return (
    <div
      className={
        "absolute left-2 right-2 rounded-xl px-3 py-2 overflow-hidden transition-all duration-200 ease-out " +
        (fading ? "opacity-0 scale-95" : "opacity-100 scale-100")
      }
      style={{
        top: topFor(entry.start),
        height: heightFor(entry.start, entry.end),
        backgroundColor: isLive ? project.color : `${project.color}1A`,
        border: isLive ? "none" : `1.5px dashed ${project.color}`,
        color: isLive ? "#fff" : project.color,
      }}
    >
      <Tooltip
        content={
          <div>
            <div className="font-semibold mb-0.5">{project.name}</div>
            <div className="text-stone-300">{fmtDuration(duration)} · {fmtTime(entry.start)}–{fmtTime(entry.end)}</div>
            <div className="text-stone-300 mt-0.5">
              {isLive ? "Tracked live" : `Logged manually — ${entry.loggedAt}`}
            </div>
          </div>
        }
      >
        <div className="flex items-start gap-1.5 h-full">
          <span className="mt-0.5 flex-shrink-0">
            {isLive ? <ClockIcon /> : <PencilIcon color={project.color} />}
          </span>
          <div className="min-w-0">
            <div className="text-[12.5px] font-medium truncate leading-tight">{entry.title}</div>
            <div className={"text-[11px] leading-tight " + (isLive ? "text-white/80" : "")} style={!isLive ? { color: project.color, opacity: 0.75 } : {}}>
              {fmtTime(entry.start)}–{fmtTime(entry.end)}
            </div>
          </div>
        </div>
      </Tooltip>
    </div>
  );
}

function ClockIcon() {
  return (
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round">
      <circle cx="12" cy="12" r="9" />
      <path d="M12 7v5l3.5 2" />
    </svg>
  );
}
function PencilIcon({ color }) {
  return (
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 20h9" />
      <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
    </svg>
  );
}

/* ---------- Untracked gap block ---------- */
function GapBlock({ gap, onClick, justFilled }) {
  const duration = gap.end - gap.start;
  return (
    <div
      className={
        "absolute left-2 right-2 rounded-xl border-2 border-dashed border-stone-300 bg-stone-100/60 hover:bg-stone-200/60 cursor-pointer transition-colors duration-150 flex items-center px-3 " +
        (justFilled ? "gap-filled-highlight" : "")
      }
      style={{ top: topFor(gap.start), height: heightFor(gap.start, gap.end) }}
      onClick={onClick}
    >
      <Tooltip
        content={<div>{fmtDuration(duration)} untracked — log this time</div>}
      >
        <div className="flex items-center h-full text-stone-400 text-[12px] font-medium tracking-wide">
          Untracked
        </div>
      </Tooltip>
    </div>
  );
}

/* ---------- Inline log form ---------- */
function LogForm({ gap, onSubmit, onCancel }) {
  const maxDuration = gap.end - gap.start;
  const [projectId, setProjectId] = useState(PROJECTS[0].id);
  const [duration, setDuration] = useState(Math.min(30, maxDuration));
  const [note, setNote] = useState("");

  return (
    <div
      className="absolute left-2 right-2 z-20 rounded-xl bg-white shadow-xl border border-stone-200 p-3 space-y-2"
      style={{ top: topFor(gap.start), minHeight: 0 }}
      onClick={(e) => e.stopPropagation()}
    >
      <div className="text-[11px] font-semibold text-stone-500 uppercase tracking-wide">
        Log time · {fmtTime(gap.start)}–{fmtTime(gap.end)}
      </div>
      <select
        value={projectId}
        onChange={(e) => setProjectId(e.target.value)}
        className="w-full text-sm rounded-lg border border-stone-200 px-2 py-1.5 bg-stone-50 focus:outline-none focus:ring-2 focus:ring-stone-300"
      >
        {PROJECTS.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
      </select>
      <div className="flex items-center gap-2">
        <input
          type="range"
          min="5"
          max={maxDuration}
          step="5"
          value={duration}
          onChange={(e) => setDuration(Number(e.target.value))}
          className="flex-1"
        />
        <span className="text-xs text-stone-600 w-16 text-right">{fmtDuration(duration)}</span>
      </div>
      <input
        type="text"
        placeholder="Note (optional)"
        value={note}
        onChange={(e) => setNote(e.target.value)}
        className="w-full text-sm rounded-lg border border-stone-200 px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-stone-300"
      />
      <div className="flex justify-end gap-2 pt-1">
        <button
          onClick={onCancel}
          className="text-xs px-3 py-1.5 rounded-lg text-stone-500 hover:bg-stone-100"
        >
          Cancel
        </button>
        <button
          onClick={() => onSubmit({ projectId, duration, note })}
          className="text-xs px-3 py-1.5 rounded-lg bg-stone-900 text-white hover:bg-stone-800"
        >
          Save entry
        </button>
      </div>
    </div>
  );
}

/* ---------- Hour grid ---------- */
function HourGrid() {
  const hours = [];
  for (let h = DAY_START; h <= DAY_END; h++) hours.push(h);
  return (
    <div className="absolute inset-0">
      {hours.map((h) => (
        <div
          key={h}
          className="absolute left-0 right-0 border-t border-stone-200"
          style={{ top: (h - DAY_START) * PX_PER_HOUR }}
        >
          <span className="absolute -top-2.5 -left-14 w-12 text-right text-[11px] text-stone-400">
            {fmtTime(toMinutes(h)).replace(":00", "")}
          </span>
        </div>
      ))}
    </div>
  );
}

/* ---------- Filter chips ---------- */
function FilterChips({ activeId, setActiveId, counts }) {
  const chips = [{ id: "all", name: "All", color: "#2A2A28" }, ...PROJECTS];
  return (
    <div className="flex items-center gap-2 flex-wrap">
      {chips.map((c) => {
        const active = activeId === c.id;
        return (
          <button
            key={c.id}
            onClick={() => setActiveId(c.id)}
            className={
              "flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-sm font-medium border transition-all duration-150 " +
              (active
                ? "shadow-sm text-white"
                : "bg-white text-stone-600 border-stone-200 hover:border-stone-300")
            }
            style={active ? { backgroundColor: c.color, borderColor: c.color } : {}}
          >
            {c.id !== "all" && (
              <span
                className="w-2 h-2 rounded-full flex-shrink-0"
                style={{ backgroundColor: active ? "rgba(255,255,255,0.85)" : c.color }}
              />
            )}
            {c.name}
            {active && (
              <span className="ml-1 text-[11px] font-normal opacity-80">
                {counts[c.id]} {counts[c.id] === 1 ? "entry" : "entries"}
              </span>
            )}
          </button>
        );
      })}
    </div>
  );
}

/* ---------- Main App ---------- */
function App() {
  const [entries, setEntries] = useState(seedEntries());
  const [activeFilter, setActiveFilter] = useState("all");
  const [openFormGap, setOpenFormGap] = useState(null); // gap key being edited
  const [justFilledKey, setJustFilledKey] = useState(null);

  const gaps = useMemo(() => computeGaps(entries), [entries]);

  const counts = useMemo(() => {
    const c = { all: entries.length };
    PROJECTS.forEach(p => { c[p.id] = entries.filter(e => e.projectId === p.id).length; });
    return c;
  }, [entries]);

  const visibleEntries = activeFilter === "all"
    ? entries
    : entries.filter(e => e.projectId === activeFilter);
  const hiddenEntries = activeFilter === "all"
    ? []
    : entries.filter(e => e.projectId !== activeFilter);

  const totalUntrackedMins = gaps.reduce((sum, g) => sum + (g.end - g.start), 0);

  const manualCount = entries.filter(e => e.type === "manual").length;
  const showConfidenceNote = entries.length > 0 && manualCount / entries.length > 0.4;

  const handleSubmitLog = (gap, { projectId, duration, note }) => {
    const newEntry = {
      id: `e-${Date.now()}`,
      projectId,
      start: gap.start,
      end: gap.start + duration,
      title: note || "Logged time",
      type: "manual",
      loggedAt: `Logged at ${fmtTime(toMinutes(new Date().getHours(), new Date().getMinutes()))}`,
    };
    setEntries(prev => [...prev, newEntry]);
    setOpenFormGap(null);
    const key = `${gap.start}-${gap.end}`;
    setJustFilledKey(key);
    setTimeout(() => setJustFilledKey(null), 1000);
  };

  const totalHeight = (DAY_END - DAY_START) * PX_PER_HOUR;

  return (
    <div className="min-h-screen px-10 py-8">
      <div className="max-w-3xl mx-auto">

        {/* Header */}
        <div className="flex items-end justify-between mb-1">
          <div>
            <h1 className="text-2xl font-semibold text-stone-800 tracking-tight">Today</h1>
            <p className="text-sm text-stone-400">Monday, June 29</p>
          </div>
          <div className="text-right">
            <div className="text-sm font-medium text-stone-600">
              {fmtDuration(totalUntrackedMins)} <span className="text-stone-400 font-normal">untracked today</span>
            </div>
            {showConfidenceNote && (
              <div className="text-xs text-stone-400 mt-0.5">
                {manualCount} of {entries.length} entries today were added after the fact
              </div>
            )}
          </div>
        </div>

        {/* Filters */}
        <div className="mt-6 mb-8">
          <FilterChips activeId={activeFilter} setActiveId={setActiveFilter} counts={counts} />
        </div>

        {/* Calendar */}
        <div className="bg-white rounded-2xl shadow-sm border border-stone-200 px-6 py-6">
          <div className="relative ml-12" style={{ height: totalHeight }}>
            <HourGrid />

            {gaps.map((g) => {
              const key = `${g.start}-${g.end}`;
              if (openFormGap === key) {
                return (
                  <LogForm
                    key={key}
                    gap={g}
                    onSubmit={(vals) => handleSubmitLog(g, vals)}
                    onCancel={() => setOpenFormGap(null)}
                  />
                );
              }
              return (
                <GapBlock
                  key={key}
                  gap={g}
                  justFilled={justFilledKey === key}
                  onClick={() => setOpenFormGap(key)}
                />
              );
            })}

            {hiddenEntries.map((e) => (
              <EntryBlock key={e.id} entry={e} fading={true} />
            ))}
            {visibleEntries.map((e) => (
              <EntryBlock key={e.id} entry={e} fading={false} />
            ))}
          </div>
        </div>

        <p className="text-center text-xs text-stone-400 mt-6">
          Toggl Focus — daily view prototype
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
